services:
  # ─── Database ────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: hermes_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hermes_net

  # ─── Message Broker / Cache ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hermes_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - hermes_net

  # ─── FastAPI Application ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hermes_api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      - DATABASE_URL=mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ${STAGING_PATH:-/var/staging}:/var/staging
      - ${NFS_THUMBNAILS_PATH:-/tmp/thumbnails}:/mnt/omv-thumbnails
      # OAuth: jika menggunakan client_secrets.json, uncomment baris di bawah
      # dan pastikan file ada sebelum menjalankan docker compose up
      # - ./client_secrets.json:/app/client_secrets.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hermes_net

  # ─── Celery Worker ────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hermes_worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - DATABASE_URL=mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - .:/app
      - ${STAGING_PATH:-/var/staging}:/var/staging
      - ${NFS_VIDEOS_PATH:-/tmp/videos}:/mnt/omv-videos
      - ${NFS_ARCHIVE_PATH:-/tmp/archive}:/mnt/omv-archive
      - ${NFS_THUMBNAILS_PATH:-/tmp/thumbnails}:/mnt/omv-thumbnails
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hermes_net

  # ─── Celery Beat (Scheduler) ──────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hermes_beat
    restart: unless-stopped
    command: >
      sh -c "mkdir -p /var/lib/celery && chmod 777 /var/lib/celery &&
             celery -A app.workers.celery_app beat --loglevel=info
             --scheduler celery.beat.PersistentScheduler
             --schedule=/var/lib/celery/schedule"
    env_file: .env
    environment:
      - DATABASE_URL=mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - .:/app
      - celery_beat_data:/var/lib/celery
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hermes_net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  celery_beat_data:
    driver: local

networks:
  hermes_net:
    driver: bridge
